usage:
  description: Use these files to visualize Isaac Lab environments in Viser
  steps:
  - 1. Load scene_hierarchy.yaml to build the scene tree
  - 2. Use prim_to_mesh.yaml to find which GLB to load for each prim
  - 3. Load GLB files from the meshes/ directory
  - 4. Apply transforms from scene_hierarchy.yaml (transforms are local to parent)
  - '5. Build transform chain: multiply parent transforms to get world transform'
  - 6. Update transforms in real-time using prim paths as keys
